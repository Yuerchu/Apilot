    showToast('请先在 Server 栏填写 Base URL');
    document.getElementById('baseUrlInput').focus();
    return;
  }
  let path = r.path;

  // Collect params
  const queryParams = [];
  const headers = { ...getAuthHeaders() };

  for (const p of r.parameters || []) {
    const el = document.getElementById(`param-${idx}-${p.name}`);
    const val = el?.value ?? '';
    if (!val && !p.required) continue;
    if (p.in === 'path') {
      path = path.replace(`{${p.name}}`, encodeURIComponent(val));
    } else if (p.in === 'query') {
      if (val) queryParams.push(`${encodeURIComponent(p.name)}=${encodeURIComponent(val)}`);
    } else if (p.in === 'header') {
      if (val) headers[p.name] = val;
    }
  }

  let url = baseUrl + path;
  if (queryParams.length) url += '?' + queryParams.join('&');

  const fetchOpts = { method: r.method.toUpperCase(), headers };

  // Body - handle different content types
  let curlContentType = null;
  if (r.requestBody) {
    const ct = document.getElementById(`ct-${idx}`)?.value || 'application/json';
    curlContentType = ct;
    if (ct === 'multipart/form-data' || ct === 'application/x-www-form-urlencoded') {
      const form = new FormData();
      const container = document.getElementById(`formdata-${idx}`);
      if (container) {
        container.querySelectorAll('[data-fd-field]').forEach(el => {
          const name = el.dataset.fdField;
          if (el.type === 'file') {
            if (el.files.length) form.append(name, el.files[0]);
          } else {
            if (el.value) form.append(name, el.value);
          }
        });
      }
      if (ct === 'application/x-www-form-urlencoded') {
        headers['Content-Type'] = 'application/x-www-form-urlencoded';
        fetchOpts.body = new URLSearchParams(form).toString();
      } else {
        // Don't set Content-Type for multipart - browser sets boundary
        fetchOpts.body = form;
      }
    } else {
      const bodyEl = document.getElementById(`body-${idx}`);
      if (bodyEl?.value.trim()) {
        headers['Content-Type'] = 'application/json';
        fetchOpts.body = bodyEl.value;
      }
    }
  }

  fetchOpts.headers = headers;

  // Build curl command before fetch
  const curlCmd = buildCurl(fetchOpts.method, url, headers, fetchOpts.body, curlContentType);

  const statusEl = document.getElementById(`req-status-${idx}`);
  statusEl.innerHTML = '<span class="spinner"></span> 请求中...';

  const start = performance.now();
  try {
    const res = await fetch(url, fetchOpts);
    const elapsed = Math.round(performance.now() - start);
    const respHeaders = {};
    res.headers.forEach((v, k) => { respHeaders[k] = v; });

    let bodyText = '';
    // 204/205/304 have no body
    if (res.status === 204 || res.status === 205 || res.status === 304) {
      bodyText = '';
    } else {
      const rawText = await res.text();
      const respCt = res.headers.get('content-type') || '';
      if (respCt.includes('json') && rawText) {
        try { bodyText = JSON.stringify(JSON.parse(rawText), null, 2); } catch { bodyText = rawText; }
      } else {
        bodyText = rawText;
      }
    }

    statusEl.textContent = '';
    renderResponse(idx, res.status, res.statusText, elapsed, respHeaders, bodyText, curlCmd);
  } catch (e) {
    statusEl.textContent = '';
    renderResponse(idx, 0, 'Network Error', Math.round(performance.now() - start), {}, e.message, curlCmd);
  }
}

function renderResponse(idx, status, statusText, elapsed, headers, body, curlCmd) {
  const container = document.getElementById(`response-${idx}`);
  const sClass = status >= 200 && status < 300 ? 's2xx' : status >= 300 && status < 400 ? 's3xx' : status >= 400 && status < 500 ? 's4xx' : 's5xx';

  let headersHtml = '';
  for (const [k, v] of Object.entries(headers)) {
    headersHtml += `${esc(k)}: ${esc(v)}\n`;
  }

  // Detect JSON body for syntax highlighting
  let isJsonBody = false;
  let jsonObj = null;
  try { jsonObj = JSON.parse(body); isJsonBody = true; } catch {}

  // Detect token-like fields in response for quick auth setup
  // Token field detection: prioritized list (higher priority = shown first)
  const TOKEN_KEYS_PRIO = { access_token: 1, accessToken: 1, token: 2, jwt: 2, bearer: 2, id_token: 3, auth_token: 3, authToken: 3, session_token: 4, api_key: 5, apiKey: 5, refresh_token: 9 };
  let tokenBtns = '';
  if (isJsonBody && jsonObj && typeof jsonObj === 'object' && status >= 200 && status < 300) {
    const findTokens = (obj, path) => {
      const found = [];
      for (const [k, v] of Object.entries(obj)) {
        const p = path ? `${path}.${k}` : k;
        if (typeof v === 'string' && v.length >= 8 && k in TOKEN_KEYS_PRIO) {
          found.push({ key: p, value: v, prio: TOKEN_KEYS_PRIO[k] });
        } else if (typeof v === 'object' && v && !Array.isArray(v)) {
          found.push(...findTokens(v, p));
        }
      }
      return found;
    };
    const tokens = findTokens(jsonObj, '').sort((a, b) => a.prio - b.prio);
    for (const t of tokens) {
      tokenBtns += `<button class="btn btn-sm token-apply-btn" data-token-value="${esc(t.value)}" data-token-key="${esc(t.key)}" title="${esc(t.key)}: ${esc(t.value.substring(0, 40))}...">设为 Token (${esc(t.key)})</button>`;
    }
  }

  const curlHtml = curlCmd ? `<div class="curl-block"><button class="curl-copy-btn" onclick="copyCurl(${idx})">复制</button>${esc(curlCmd)}</div>` : '';

  container.innerHTML = `
    ${curlHtml}
    <div class="response-panel" style="margin-top:${curlCmd ? '8' : '14'}px;">
      <div class="response-status ${sClass}">
        <span>${status} ${esc(statusText)}</span>
        <span class="resp-time">${elapsed}ms</span>
      </div>
      ${headersHtml ? `<details class="response-headers"><summary>Response Headers</summary><pre style="margin:4px 0;font-size:11px;">${headersHtml}</pre></details>` : ''}
      <div class="response-body">${isJsonBody ? highlightJson(body) : esc(body)}</div>
      <div class="response-copy">
        ${tokenBtns}
        <button class="btn btn-sm" onclick="copyResponseBody(${idx})">复制 Body</button>
        <button class="btn btn-sm" onclick="copyResponseFull(${idx})">复制完整响应</button>
      </div>
    </div>`;

  // Store for copy
  container._respData = { status, statusText, headers, body, curlCmd };

  // Bind token apply buttons
  container.querySelectorAll('.token-apply-btn').forEach(btn => {
    btn.addEventListener('click', () => applyToken(btn.dataset.tokenValue, btn.dataset.tokenKey));
  });
}

function copyCurl(idx) {
  const data = document.getElementById(`response-${idx}`)._respData;
  if (data?.curlCmd) navigator.clipboard.writeText(data.curlCmd).then(() => showToast('curl 命令已复制'));
}

function applyToken(token, fieldName) {
  // Set auth type to bearer and fill in the token
  document.getElementById('authType').value = 'bearer';
  onAuthTypeChange();
  document.getElementById('authToken').value = token;
  // Also store as OAuth2 token for compatibility
  window._oauth2Token = token;
  saveSettings();
  showToast(`已从 "${fieldName}" 设为 Bearer Token`);
}

function copyResponseBody(idx) {
  const data = document.getElementById(`response-${idx}`)._respData;
  if (data) navigator.clipboard.writeText(data.body).then(() => showToast('Body 已复制'));
}

function copyResponseFull(idx) {
  const data = document.getElementById(`response-${idx}`)._respData;
  if (!data) return;
  let text = `HTTP ${data.status} ${data.statusText}\n`;
  for (const [k, v] of Object.entries(data.headers)) text += `${k}: ${v}\n`;
  text += `\n${data.body}`;
  navigator.clipboard.writeText(text).then(() => showToast('完整响应已复制'));
}

// ---- Selection ----
function toggleRoute(idx, checked) {
  routes[idx].selected = checked;
  const card = document.getElementById('card-' + idx);
  if (card) card.classList.toggle('selected', checked);
  updateCount();
  updateGroupCheck(idx);
}

function toggleGroup(groupId, idxList) {
  const cb = document.getElementById(groupId);
  const checked = cb.checked;
  cb.indeterminate = false;
  for (const idx of idxList) {
    routes[idx].selected = checked;
    const card = document.getElementById('card-' + idx);
    if (card) {
      card.classList.toggle('selected', checked);
      const rcb = card.querySelector('.route-check');
      if (rcb) rcb.checked = checked;
    }
  }
  updateCount();
}

function updateGroupCheck(idx) {
  // Find the group containing this route
  const card = document.getElementById('card-' + idx);
  if (!card) return;
  const group = card.closest('.route-group');
  if (!group) return;
  const cb = group.querySelector('.group-check');
  if (!cb) return;
  const checks = group.querySelectorAll('.route-check');
  const total = checks.length;
  const selected = [...checks].filter(c => c.checked).length;
  if (selected === 0) { cb.checked = false; cb.indeterminate = false; }
  else if (selected === total) { cb.checked = true; cb.indeterminate = false; }
  else { cb.checked = false; cb.indeterminate = true; }
}

function toggleSelectAll() {
  const checked = document.getElementById('selectAll').checked;
  document.querySelectorAll('.route-check').forEach(cb => {
    cb.checked = checked;
    const idx = parseInt(cb.closest('.route-card').id.replace('card-', ''));
    routes[idx].selected = checked;
    cb.closest('.route-card').classList.toggle('selected', checked);
  });
  updateCount();
}

function updateCount() {
  const count = routes.filter(r => r.selected).length;
  document.getElementById('copyCount').textContent = `已选 ${count} 个`;
  // Update FAB
  document.getElementById('fabCount').textContent = count;
  document.getElementById('selectionFab').classList.toggle('show', count > 0);
}

function clearSelection() {
  routes.forEach(r => r.selected = false);
  document.querySelectorAll('.route-check').forEach(cb => {
    cb.checked = false;
    cb.closest('.route-card')?.classList.remove('selected');
  });
  document.querySelectorAll('.group-check').forEach(cb => {
    cb.checked = false;
    cb.indeterminate = false;
  });
  document.getElementById('selectAll').checked = false;
  updateCount();
}

// ---- Schema formatting (for copy) ----
function formatSchema(schema, indent, maxDepth) {
  if (!schema) return 'any';
  if (maxDepth <= 0) return '  '.repeat(indent) + '...';
  if (schema._circular) return '  '.repeat(indent) + `(circular: ${schema._circular})`;
  if (schema._unresolved) return '  '.repeat(indent) + `(unresolved: ${schema._unresolved})`;
  const pad = '  '.repeat(indent), pad1 = '  '.repeat(indent + 1);
  let lines = [];

  if (schema.allOf) {
    lines.push(`${pad}allOf:`);
    for (const sub of schema.allOf) lines.push(formatSchema(sub, indent + 1, maxDepth - 1));
    return lines.join('\n');
  }
  if (schema.anyOf) {
    lines.push(`${pad}anyOf:`);
    for (let i = 0; i < schema.anyOf.length; i++) { lines.push(`${pad1}#${i}:`); lines.push(formatSchema(schema.anyOf[i], indent + 2, maxDepth - 1)); }
    return lines.join('\n');
  }
  if (schema.oneOf) {
    lines.push(`${pad}oneOf:`);
    for (let i = 0; i < schema.oneOf.length; i++) { lines.push(`${pad1}#${i}:`); lines.push(formatSchema(schema.oneOf[i], indent + 2, maxDepth - 1)); }
    return lines.join('\n');
  }

  const type = schema.type;
  const title = schema.title ? ` (${schema.title})` : '';
  const desc = schema.description ? ` — ${schema.description}` : '';
  const required = new Set(schema.required || []);

  if (type === 'object' || schema.properties) {
    const extra = schema.additionalProperties === false ? ', additionalProperties: false' : '';
    lines.push(`${pad}object${title}${desc}${extra}`);
    if (schema.properties) {
      for (const [name, prop] of Object.entries(schema.properties)) {
        const req = required.has(name) ? ' (required)' : '';
        const ptype = getTypeStr(prop);
        const pdesc = prop.description ? ` — ${prop.description}` : '';
        const constraints = getConstraints(prop);
        if ((prop.type === 'object' || prop.properties) && !prop._circular) {
          lines.push(`${pad1}${name}${req}: ${ptype}${pdesc}${constraints}`);
          lines.push(formatSchema(prop, indent + 2, maxDepth - 1));
        } else if (prop.type === 'array' && prop.items && (prop.items.type === 'object' || prop.items.properties)) {
          lines.push(`${pad1}${name}${req}: array${pdesc}${constraints}`);
          lines.push(`${pad1}  items:`);
          lines.push(formatSchema(prop.items, indent + 3, maxDepth - 1));
        } else if (prop.anyOf || prop.oneOf || prop.allOf) {
          lines.push(`${pad1}${name}${req}:${pdesc}`);
          lines.push(formatSchema(prop, indent + 2, maxDepth - 1));
        } else {
          lines.push(`${pad1}${name}${req}: ${ptype}${pdesc}${constraints}`);
        }
      }
    }
    return lines.join('\n');
  }
  if (type === 'array') {
    lines.push(`${pad}array${title}${desc}`);
    if (schema.items) {
      lines.push(`${pad1}items: ${getTypeStr(schema.items)}`);
      if (schema.items.type === 'object' || schema.items.properties) lines.push(formatSchema(schema.items, indent + 2, maxDepth - 1));
    }
    return lines.join('\n');
  }
  return `${pad}${getTypeStr(schema)}${title}${desc}${getConstraints(schema)}`;
}

function getTypeStr(schema) {
  if (!schema) return 'any';
  // OAS 3.1: type can be array like ["string", "null"]
  let t;
  if (Array.isArray(schema.type)) {
    t = schema.type.filter(x => x !== 'null').join(' | ') || 'any';
    if (schema.type.includes('null')) t += ' | null';
  } else {
    t = schema.type || 'any';
  }
  if (schema.format) t += `(${schema.format})`;
  if (schema.const !== undefined) t += ` const: ${JSON.stringify(schema.const)}`;
  if (schema.enum) t += ` enum: [${schema.enum.join(', ')}]`;
  if (schema.default !== undefined) t += ` default: ${JSON.stringify(schema.default)}`;
  // OAS 3.0 nullable / Swagger 2.0 x-nullable
  if (schema.nullable || schema['x-nullable']) t += ' | null';
  if (schema.anyOf) {
    const types = schema.anyOf.map(s => s.type).filter(Boolean);
    if (types.includes('null')) {
      const other = schema.anyOf.find(s => s.type !== 'null');
      if (other) return getTypeStr(other) + ' | null';
    }
  }
  return t;
}

function getConstraints(prop) {
  const p = [];
  if (prop.maxLength !== undefined) p.push(`maxLen: ${prop.maxLength}`);
  if (prop.minLength !== undefined) p.push(`minLen: ${prop.minLength}`);
  if (prop.maximum !== undefined) p.push(`max: ${prop.maximum}`);
  if (prop.minimum !== undefined) p.push(`min: ${prop.minimum}`);
  if (prop.exclusiveMaximum !== undefined) p.push(`exclusiveMax: ${prop.exclusiveMaximum}`);
  if (prop.exclusiveMinimum !== undefined) p.push(`exclusiveMin: ${prop.exclusiveMinimum}`);
  if (prop.pattern) p.push(`pattern: ${prop.pattern}`);
  if (prop.maxItems !== undefined) p.push(`maxItems: ${prop.maxItems}`);
  if (prop.minItems !== undefined) p.push(`minItems: ${prop.minItems}`);
  if (prop.uniqueItems) p.push('uniqueItems');
  return p.length ? ` [${p.join(', ')}]` : '';
}

// ---- Copy formatting ----
function formatRoute(r) {
  const fmt = document.querySelector('input[name="format"]:checked')?.value || 'markdown';
  const incEx = document.getElementById('includeExamples')?.checked;
  return fmt === 'markdown' ? formatMarkdown(r, incEx) : formatYaml(r, incEx);
}

function formatMarkdown(r, includeExamples) {
  let out = `## ${r.method.toUpperCase()} ${r.path}\n`;
  if (r.summary) out += `${r.summary}\n`;
  if (r.description && r.description !== r.summary) out += `${r.description}\n`;
  if (r.operationId) out += `Operation ID: ${r.operationId}\n`;
  if (r.parameters?.length) {
    out += `\n### Parameters\n`;
    for (const p of r.parameters) {
      const req = p.required ? ' (required)' : '';
      const ptype = p.schema ? getTypeStr(p.schema) : (p.type || 'string');
      const desc = p.description ? ` — ${p.description}` : '';
      out += `- ${p.name}${req}: ${ptype}, in: ${p.in}${desc}\n`;
      if (p.schema?.enum) out += `  enum: [${p.schema.enum.join(', ')}]\n`;
      if (p.schema?.default !== undefined) out += `  default: ${JSON.stringify(p.schema.default)}\n`;
    }
  }
  if (r.requestBody) {
    out += `\n### Request Body${r.requestBody.required ? ' (required)' : ''}\n`;
    if (r.requestBody.description) out += `${r.requestBody.description}\n`;
    for (const [mt, mo] of Object.entries(r.requestBody.content || {})) {
      out += `\nContent-Type: ${mt}\n`;
      if (mo.schema) out += `Schema:\n${formatSchema(mo.schema, 1, 15)}\n`;
      if (includeExamples) {
        const ex = mo.example || generateExample(mo.schema);
        if (ex) out += `Example:\n${JSON.stringify(ex, null, 2)}\n`;
      }
    }
  }
  out += `\n### Responses\n`;
  for (const [code, resp] of Object.entries(r.responses)) {
    out += `\n#### ${code}: ${resp.description || ''}\n`;
    for (const [mt, mo] of Object.entries(resp.content || {})) {
      out += `Content-Type: ${mt}\n`;
      if (mo.schema) out += `Schema:\n${formatSchema(mo.schema, 1, 15)}\n`;
      if (includeExamples) {
        const ex = mo.example || generateExample(mo.schema);
        if (ex) out += `Example:\n${JSON.stringify(ex, null, 2)}\n`;
      }
    }
  }
  return out;
}

function formatYaml(r, includeExamples) {
  let out = `${r.method.toUpperCase()} ${r.path}:\n`;
  if (r.summary) out += `  summary: ${r.summary}\n`;
  if (r.description && r.description !== r.summary) out += `  description: ${r.description}\n`;
  if (r.operationId) out += `  operationId: ${r.operationId}\n`;
  if (r.parameters?.length) {
    out += `  parameters:\n`;
    for (const p of r.parameters) {
      out += `    - name: ${p.name}\n      in: ${p.in}\n`;
      if (p.required) out += `      required: true\n`;
      if (p.schema) out += `      type: ${getTypeStr(p.schema)}\n`;
      if (p.description) out += `      description: ${p.description}\n`;
    }
  }
  if (r.requestBody) {
    out += `  requestBody:\n`;
    if (r.requestBody.required) out += `    required: true\n`;
    for (const [mt, mo] of Object.entries(r.requestBody.content || {})) {
      out += `    ${mt}:\n`;
      if (mo.schema) out += `      schema:\n${formatSchema(mo.schema, 4, 15)}\n`;
    }
  }
  out += `  responses:\n`;
  for (const [code, resp] of Object.entries(r.responses)) {
    out += `    ${code}:\n`;
    if (resp.description) out += `      description: ${resp.description}\n`;
    for (const [mt, mo] of Object.entries(resp.content || {})) {
      out += `      ${mt}:\n`;
      if (mo.schema) out += `        schema:\n${formatSchema(mo.schema, 5, 15)}\n`;
    }
  }
  return out;
}

// ---- Copy ----
function copySingle(idx) {
  navigator.clipboard.writeText(formatRoute(routes[idx])).then(() => showToast('已复制到剪贴板'));
}

function copySelected() {
  const selected = routes.filter(r => r.selected);
  if (!selected.length) { showToast('请先选择路由'); return; }
  const text = selected.map(r => formatRoute(r)).join('\n---\n\n');
  navigator.clipboard.writeText(text).then(() => showToast(`已复制 ${selected.length} 个路由到剪贴板`));
}

// ---- localStorage persistence ----
const LS_KEYS = { url: 'oa_specUrl', base: 'oa_baseUrl', authType: 'oa_authType', authToken: 'oa_authToken', authUser: 'oa_authUser', authKeyName: 'oa_authKeyName', oauth2Token: 'oa_oauth2Token' };

function saveSettings() {
  localStorage.setItem(LS_KEYS.base, document.getElementById('baseUrlInput').value);
  localStorage.setItem(LS_KEYS.authType, document.getElementById('authType').value);
  localStorage.setItem(LS_KEYS.authToken, document.getElementById('authToken').value);
  localStorage.setItem(LS_KEYS.authUser, document.getElementById('authUser').value);
  localStorage.setItem(LS_KEYS.authKeyName, document.getElementById('authKeyName').value);
  if (window._oauth2Token) localStorage.setItem(LS_KEYS.oauth2Token, window._oauth2Token);
}

function restoreSettings() {
  const url = localStorage.getItem(LS_KEYS.url);
  if (url) document.getElementById('urlInput').value = url;
  const authType = localStorage.getItem(LS_KEYS.authType);
  if (authType) { document.getElementById('authType').value = authType; onAuthTypeChange(); }
  const authToken = localStorage.getItem(LS_KEYS.authToken);
  if (authToken) document.getElementById('authToken').value = authToken;
  const authUser = localStorage.getItem(LS_KEYS.authUser);
  if (authUser) document.getElementById('authUser').value = authUser;
  const authKeyName = localStorage.getItem(LS_KEYS.authKeyName);
  if (authKeyName) document.getElementById('authKeyName').value = authKeyName;
  // Restore OAuth2 token
  const oauth2Token = localStorage.getItem(LS_KEYS.oauth2Token);
  if (oauth2Token) {
    window._oauth2Token = oauth2Token;
    document.getElementById('oauth2Status').innerHTML = '<span class="oauth2-authed">已认证</span>';
  }
}

// Auto-save on input changes
['baseUrlInput', 'authToken', 'authUser', 'authKeyName'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveSettings);
});
['authType'].forEach(id => {
  document.getElementById(id).addEventListener('change', saveSettings);
});

// Save spec URL on successful load
const _origLoadSpec = loadSpec;
loadSpec = async function() {
  await _origLoadSpec();
  if (spec) localStorage.setItem(LS_KEYS.url, document.getElementById('urlInput').value.trim());
  saveSettings();
};

// Save base URL when server changes
const _origOnServerSelect = onServerSelect;
onServerSelect = function() { _origOnServerSelect(); saveSettings(); };

// ---- Embedded mode (FastAPI integration) ----
// When window.__OPENAPI_URL__ is set, auto-load and hide the header
if (window.__OPENAPI_URL__) {
  document.querySelector('.header').style.display = 'none';
  document.getElementById('urlInput').value = window.__OPENAPI_URL__;
  if (window.__OPENAPI_TITLE__) document.title = window.__OPENAPI_TITLE__;
  loadSpec();
} else {
  // Standalone mode: restore settings and auto-load
  restoreSettings();
  if (location.hash) {
    document.getElementById('urlInput').value = decodeURIComponent(location.hash.slice(1));
    loadSpec();
  } else if (document.getElementById('urlInput').value) {
    loadSpec();
  }
}
</script>
