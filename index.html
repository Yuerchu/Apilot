<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenAPI Schema Copier for LLM</title>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/schema.css">
<link rel="stylesheet" href="assets/css/feedback.css">
<link rel="stylesheet" href="assets/css/misc.css">
</head>
<body>

<div class="header">
  <input type="text" id="urlInput" placeholder="输入 OpenAPI JSON URL（如 http://localhost:8000/openapi.json）" onkeydown="if(event.key==='Enter')loadSpec()">
  <button class="btn btn-primary" id="loadBtn" onclick="loadSpec()">加载</button>
  <label style="cursor:pointer"><input type="file" id="fileInput" accept=".json,.yaml,.yml" style="display:none" onchange="loadFile(event)"><span class="btn">本地文件</span></label>
</div>

<div id="serverBar" class="server-bar" style="display:none;">
  <label>Server:</label>
  <select id="serverSelect" onchange="onServerSelect()"></select>
  <input type="text" id="baseUrlInput" placeholder="请填写服务端地址（如 http://localhost:8000）" style="max-width:500px;">
</div>

<div id="authBar" class="auth-bar" style="display:none;">
  <label>Auth:</label>
  <select id="authType" onchange="onAuthTypeChange()">
    <option value="none">无认证</option>
    <option value="bearer">Bearer Token</option>
    <option value="basic">Basic Auth</option>
    <option value="apikey">API Key (Header)</option>
    <option value="oauth2">OAuth2 Password</option>
  </select>
  <input type="password" id="authToken" placeholder="Token / Password" style="display:none;">
  <input type="text" id="authUser" placeholder="Username" style="display:none; width:150px;">
  <input type="text" id="authKeyName" placeholder="Header Name (如 X-API-Key)" style="display:none; width:180px;">
  <span id="oauth2Fields" style="display:none;gap:6px;align-items:center;">
    <input type="text" id="oauth2User" placeholder="Username" style="width:130px;">
    <input type="password" id="oauth2Pass" placeholder="Password" style="width:130px;">
    <input type="text" id="oauth2TokenUrl" placeholder="Token URL" style="width:200px;">
    <button class="btn btn-primary btn-sm" id="oauth2LoginBtn" onclick="oauth2Login()">登录</button>
    <span id="oauth2Status" style="font-size:12px;"></span>
  </span>
</div>

<div id="infoBar" class="info-bar" style="display:none;"></div>

<div id="mainTabs" class="main-tabs" style="display:none;">
  <button class="main-tab active" data-view="endpoints" onclick="switchMainView('endpoints')">API 端点</button>
  <button class="main-tab" data-view="models" onclick="switchMainView('models')">数据模型</button>
</div>

<div id="toolbar" class="toolbar" style="display:none;">
  <label><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> 全选</label>
  <input class="filter-input" type="text" id="filterInput" placeholder="搜索路由..." oninput="applyFilter()">
  <div class="spacer"></div>
  <div class="format-options">
    <label><input type="radio" name="format" value="markdown" checked> Markdown</label>
    <label><input type="radio" name="format" value="yaml"> YAML-like</label>
    <label><input type="checkbox" id="includeExamples"> 含示例</label>
  </div>
  <span class="copy-count" id="copyCount">已选 0 个</span>
  <button class="btn btn-accent" onclick="copySelected()">复制选中</button>
</div>

<div id="tagBar" class="toolbar" style="display:none;">
  <div class="tag-section">
    <div class="tag-toggle-bar" onclick="toggleTagPanel()">
      <span class="tag-arrow" id="tagArrow">&#9654;</span>
      <span>标签筛选</span>
      <span class="tag-count" id="tagTotalCount">0</span>
      <span class="tag-active-count" id="tagActiveInfo"></span>
    </div>
    <div class="tag-panel" id="tagPanel">
      <input class="tag-search" type="text" id="tagSearchInput" placeholder="搜索标签..." oninput="filterTags()">
      <div class="tag-actions">
        <button onclick="clearAllTags()">清除筛选</button>
        <button onclick="invertTags()">反选</button>
      </div>
      <div class="tag-filters" id="tagFilters"></div>
    </div>
  </div>
</div>

<div class="content" id="content">
  <div class="empty-state">
    <h2>OpenAPI Schema Copier</h2>
    <p>输入 OpenAPI 规范的 URL 或上传本地文件<br>选择路由后一键复制完整 Schema 供大模型使用，也可直接发起请求测试</p>
  </div>
</div>

<div class="content" id="modelsView" style="display:none;">
  <div class="models-toolbar">
    <label><input type="checkbox" id="modelSelectAll" onchange="toggleModelSelectAll()"> 全选</label>
    <input class="filter-input" type="text" id="modelFilterInput" placeholder="搜索数据模型..." oninput="applyModelFilter()">
    <div class="spacer"></div>
    <span class="copy-count" id="modelCount">0 个模型</span>
    <span class="copy-count" id="modelSelCount" style="color:#3fb950;"></span>
    <button class="btn btn-accent" onclick="copySelectedModels()">复制选中</button>
  </div>
  <div id="modelsList"></div>
</div>

<div class="toast" id="toast"></div>
<div class="selection-fab" id="selectionFab">
  <span>已选 <span class="fab-count" id="fabCount">0</span> 个</span>
  <button class="fab-btn fab-btn-primary" onclick="copySelected()">复制选中</button>
  <button class="fab-btn fab-btn-danger" onclick="clearSelection()">清除</button>
</div>
<div class="selection-fab" id="modelsFab">
  <span>已选 <span class="fab-count" id="modelsFabCount">0</span> 个模型</span>
  <button class="fab-btn fab-btn-primary" onclick="copySelectedModels()">复制选中</button>
  <button class="fab-btn fab-btn-danger" onclick="clearModelSelection()">清除</button>
</div>

<script src="assets/js/core.js"></script>
<script src="assets/js/spec.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/runtime.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/init.js"></script>
</body>
</html>
